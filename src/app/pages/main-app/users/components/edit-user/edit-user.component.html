@let form = formData()!;
<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row g-4 mx-4">
        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="name" class="form-label">NAME <span class="error-color">*</span></label>
            <input type="text" class="form-control" placeholder="Enter name" formControlName="name"/>

        </div>
        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="email" class="form-label">EMAIL <span class="error-color">*</span></label>
            <input type="email" class="form-control" placeholder="Enter email" formControlName="email"/>
        </div>
        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="phone" class="form-label">PHONE <span class="error-color">*</span></label>
            <input type="text" class="form-control" placeholder="Enter phone" formControlName="phone"/>
        </div>

        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="dob" class="form-label">DOB <span class="error-color">*</span></label>
            <input type="text" class="form-control" placeholder="Enter dob" formControlName="dob"
            bsDatepicker
            [bsConfig]="datePickerConfig"
            />
        </div>

        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="gender" class="form-label">GENDER <span class="error-color">*</span></label>
            <ngx-select [items]="['male', 'female']" placeholder="Select Gender" formControlName="gender"></ngx-select>
        </div>

        <div class="form-group col-xl-6 col-sm-6 col-12">
            <label for="address" class="form-label">ADDRESS </label>
            <textarea type="text" class="form-control" placeholder="Enter address" formControlName="address" [rows]="1">
            </textarea>
        </div>

        <div class="boxer-footer mt-4 d-flex justify-content-end">
            <button mat-raised-button color="primary" type="submit" >
                <mat-icon ria-hidden="false" aria-label="add icon" fontIcon="upload"></mat-icon>
                Submit
            </button>
        </div>
        

    </div>
</form>
